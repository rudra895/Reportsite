name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build site
        env:
          GITHUB_PAGES: true
        run: npm run build

      - name: Add Pages HTML shell
        run: |
          ENTRY_FILE=$(basename $(ls dist/client/assets/index-*.js | head -n 1))
          cat > dist/client/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>SSJ Brokerage PA Agent</title>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="./assets/$ENTRY_FILE"></script>
            </body>
          </html>
          EOF
          cp dist/client/index.html dist/client/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4